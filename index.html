<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Career &amp; Learning Tracker</title>
<style>body { margin: 0; background: #fbf8f2; color: #8a7f70; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; text-align: center; padding-top: 60px; }</style>
<script>
  // Route to the layout that fits the device: small or touch-first screens
  // get the mobile app, everything else the desktop dashboard.
  var mobile = window.matchMedia('(max-width: 768px)').matches ||
    (window.matchMedia('(pointer: coarse)').matches && window.matchMedia('(max-width: 1024px)').matches);
  location.replace(mobile ? 'mobile.html' : 'desktop.html');
</script>
</head>
<body>
<p>Loading tracker… <a href="desktop.html">desktop</a> · <a href="mobile.html">mobile</a></p>
</body>
</html>
